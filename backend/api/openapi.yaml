openapi: "3.0.3"

info:
  title: SicouLab API
  version: 0.1.0
  description: SicouLab バックエンドAPI

tags:
  - name: auth
    description: 認証・セッション管理API
  - name: system
    description: システム管理API

servers:
  - url: http://localhost:8080/api/v1
    description: ローカル開発環境

paths:
  /api/v1/health:
    get:
      summary: ヘルスチェック
      tags:
        - system
      responses:
        "200":
          description: 正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/v1/auth/login:
    post:
      summary: ログイン
      description: Firebase ID Tokenを検証し、セッションを開始する。初回ログイン時はユーザーを自動登録する。
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id_token
              properties:
                id_token:
                  type: string
                  description: Firebase ID Token（JWT形式）
      responses:
        "200":
          description: ログイン成功
          headers:
            Set-Cookie:
              description: セッションCookie（HttpOnly + Secure + SameSite=Lax, 有効期限7日）
              schema:
                type: string
                example: session=<id_token>; Max-Age=604800; Path=/; HttpOnly; Secure; SameSite=Lax
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: リクエスト不正
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: 認証失敗（無効なID Token）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/me:
    get:
      summary: セッション確認・ユーザー情報取得
      description: 現在のセッションCookieを検証し、ユーザー情報を返す
      tags:
        - auth
      security:
        - SessionAuth: []
      responses:
        "200":
          description: セッション有効
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: 未認証（無効なセッション）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/logout:
    post:
      summary: ログアウト
      description: セッションCookieを削除する
      tags:
        - auth
      security:
        - SessionAuth: []
      responses:
        "204":
          description: ログアウト成功（セッションCookie削除）
          headers:
            Set-Cookie:
              description: セッションCookie削除
              schema:
                type: string
                example: session=; Max-Age=0; Path=/; HttpOnly; Secure; SameSite=Lax
        "401":
          description: 未認証
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: サーバーエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    SessionAuth:
      type: apiKey
      in: cookie
      name: session
      description: セッション認証（HttpOnly Cookie）

  schemas:
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: "エラーコード（例: UNAUTHORIZED, NOT_FOUND）"
        message:
          type: string
          description: エラーメッセージ

    User:
      type: object
      required:
        - id
        - name
        - role
        - created_at
      properties:
        id:
          type: integer
          format: int64
          description: ユーザーID
        name:
          type: string
          description: 表示名
        display_name:
          type: string
          nullable: true
          description: OAuthプロバイダから取得した表示名
        avatar_url:
          type: string
          nullable: true
          description: アバター画像URL
        role:
          type: string
          enum: [admin, writer, user]
          description: ユーザーロール
        plan_id:
          type: integer
          format: int64
          nullable: true
          description: プランID
        subscription_status:
          type: string
          enum: [active, canceled, past_due]
          nullable: true
          description: サブスクリプション状態
        created_at:
          type: string
          format: date-time
          description: 作成日時

    LoginResponse:
      type: object
      required:
        - user
        - is_first_login
      properties:
        user:
          $ref: "#/components/schemas/User"
        is_first_login:
          type: boolean
          description: 初回ログインかどうか（trueの場合はサブスクリプション登録へ誘導）

    UserResponse:
      type: object
      required:
        - user
      properties:
        user:
          $ref: "#/components/schemas/User"

    PaginationParams:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
          default: 1
          description: ページ番号
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
          description: 1ページあたりの件数

    CursorPaginationResponse:
      type: object
      required:
        - data
        - has_more
      properties:
        data:
          type: array
          items: {}
          description: レスポンスデータ配列
        next_cursor:
          type: string
          nullable: true
          description: 次ページのカーソル（最終ページの場合はnull）
        has_more:
          type: boolean
          description: 次のページが存在するか
