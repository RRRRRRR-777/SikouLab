name: Documentation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'backend/**/*.go'
      - 'frontend/**/*.ts'
      - 'frontend/**/*.tsx'
      - 'backend/api/openapi.yaml'
      - 'docs/**'
      - '.claude/**'
      - 'index.html'
      - 'README.md'
      - '.github/workflows/doc-check.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**/*.ts'
      - 'frontend/**/*.tsx'
      - 'backend/api/openapi.yaml'
      - 'docs/**'
      - '.claude/**'
      - 'index.html'
      - 'README.md'
      - '.github/workflows/doc-check.yml'

jobs:
  # PR時: バックエンドdocコメントチェック
  check-backend:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Check documentation comments
        working-directory: backend
        run: go run check_doc.go

  # PR時: フロントエンドdocコメントチェック
  check-frontend:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Check documentation comments
        working-directory: frontend
        run: npm run lint

  # main push時: Cloudflare Pagesへデプロイ
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate TypeDoc
        working-directory: frontend
        run: npm run docs

      # TypeDoc を生成
      - name: Generate TypeDoc
        working-directory: frontend
        run: npm run docs

      # ドキュメント用の public ディレクトリを準備
      - name: Prepare public directory
        run: |
          # 既存の frontend/docs を削除して再作成
          rm -rf public
          mkdir -p public

          # docsify 用 index.html をコピー
          cp index.html public/

          # docs/ 配下（全体）
          mkdir -p public/docs
          cp -r docs/* public/docs/

          # .claude/ 配下
          mkdir -p public/.claude
          cp -r .claude/rules public/.claude/
          cp -r .claude/skills public/.claude/
          cp .claude/CLAUDE.md public/.claude/

          # TypeDoc
          mkdir -p public/frontend
          cp -r frontend/docs/. public/frontend/

          # OpenAPI + Swagger UI
          mkdir -p public/backend
          cp backend/api/openapi.yaml public/backend/openapi.yaml
          cat > public/backend/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <title>SicouLab API Docs</title>
              <meta charset="utf-8"/>
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
            </head>
            <body>
              <div id="swagger-ui"></div>
              <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
              <script>
                SwaggerUIBundle({
                  url: './openapi.yaml',
                  dom_id: '#swagger-ui',
                  presets: [SwaggerUIBundle.presets.apis],
                  layout: 'BaseLayout'
                });
              </script>
            </body>
          </html>
          EOF

          # README
          cp README.md public/

          # .nojekyll（GitHub Pages 互換性）
          touch public/.nojekyll

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=sicoulab-docs --commit-dirty=true
          wranglerVersion: "4.67.0"
