name: Documentation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'backend/**/*.go'
      - 'frontend/**/*.ts'
      - 'frontend/**/*.tsx'
      - 'backend/api/openapi.yaml'
  push:
    branches: [main, test/ci-check-jobs]
    paths:
      - 'frontend/**/*.ts'
      - 'frontend/**/*.tsx'
      - 'backend/api/openapi.yaml'

jobs:
  # PR時: バックエンドdocコメントチェック
  check-backend:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Check documentation comments
        working-directory: backend
        run: go run check_doc.go

  # PR時: フロントエンドdocコメントチェック
  check-frontend:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Check documentation comments
        working-directory: frontend
        run: npm run lint

  # main push時: Cloudflare Pagesへデプロイ
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate TypeDoc
        working-directory: frontend
        run: npm run docs

      - name: Prepare public directory
        run: |
          mkdir -p public/frontend
          mkdir -p public/backend
          cp -r frontend/docs/. public/frontend/
          cp backend/api/openapi.yaml public/backend/openapi.yaml

      - name: Create Swagger UI page
        run: |
          cat > public/backend/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <title>SicouLab API Docs</title>
              <meta charset="utf-8"/>
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
            </head>
            <body>
              <div id="swagger-ui"></div>
              <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
              <script>
                SwaggerUIBundle({
                  url: './openapi.yaml',
                  dom_id: '#swagger-ui',
                  presets: [SwaggerUIBundle.presets.apis],
                  layout: 'BaseLayout'
                });
              </script>
            </body>
          </html>
          EOF

      - name: Create index page
        run: |
          cat > public/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <title>SicouLab Docs</title>
              <meta charset="utf-8"/>
            </head>
            <body>
              <h1>SicouLab ドキュメント</h1>
              <ul>
                <li><a href="./frontend/">Frontend（TypeDoc）</a></li>
                <li><a href="./backend/">Backend API（Swagger UI）</a></li>
              </ul>
            </body>
          </html>
          EOF

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=sicoulab-docs
