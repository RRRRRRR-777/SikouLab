name: Docker Build

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - 'backend/Dockerfile'
      - 'frontend/Dockerfile'
      - '.github/workflows/docker-build.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - 'backend/Dockerfile'
      - 'frontend/Dockerfile'
      - '.github/workflows/docker-build.yml'

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker containers
        run: docker-compose build

      - name: Verify images
        run: docker images
