services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - API_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_started
    networks:
      - sicoulab

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/sicoulab_database_development?sslmode=disable
      - SERVER_PORT=8080
      - SERVER_HOST=0.0.0.0
      - ALLOWED_ORIGINS=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sicoulab

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sicoulab_database_development
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sicoulab

  swagger-ui:
    image: swaggerapi/swagger-ui
    ports:
      - "8081:8080"
    environment:
      SWAGGER_JSON: /api/openapi.yaml
    volumes:
      - ./backend/api:/api
    profiles:
      - swagger

  typedoc:
    image: nginx:alpine
    ports:
      - "8082:80"
    volumes:
      - ./frontend/docs:/usr/share/nginx/html:ro
    profiles:
      - docs

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --config /etc/cloudflared/config-sicoulab.yml run sicoulab
    restart: on-failure:5
    volumes:
      - ${HOME}/.cloudflared:/etc/cloudflared:ro
    networks:
      - sicoulab
    profiles:
      - tunnel

volumes:
  postgres_data:

networks:
  sicoulab:
    driver: bridge
